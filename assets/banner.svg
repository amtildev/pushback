<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Pushback</title>
  <desc id="desc">A repository banner for Pushback, a Codex skill that challenges weak assumptions before agreeing.</desc>
